@if (collapsed()) {
  <aside class="rail">
    <button
      type="button"
      class="rail-toggle"
      title="Expand library"
      aria-label="Expand library"
      (click)="toggle()"
    >
      <ng-icon name="phosphorBooks" size="22" />
    </button>
  </aside>
} @else {
  <aside class="panel">
    <header class="panel-header">
      <h2 class="panel-title">Library</h2>
      <button
        type="button"
        class="icon-button"
        title="Collapse library"
        aria-label="Collapse library"
        (click)="toggle()"
      >
        <ng-icon name="phosphorCaretLeft" size="18" />
      </button>
    </header>

    <section class="library-section">
      <button type="button" class="add-button" (click)="onAddCharacter()">
        <ng-icon name="phosphorPlus" size="16" />
        <span>Add character</span>
      </button>

      <div class="items" aria-live="polite">
        <p class="empty">No items yet.</p>
      </div>
    </section>

    <hr class="section-divider" />

    <section class="notes-section">
      <h3 class="section-title">Notes</h3>

      <ng-diagram-palette-item [item]="store.paletteItem">
        <div class="palette-note">
          <ng-icon name="phosphorNote" size="16" />
          <span>Note</span>
        </div>
        <ng-diagram-palette-item-preview>
          <div class="palette-note palette-note--preview">
            <ng-icon name="phosphorNote" size="16" />
            <span>Note</span>
          </div>
        </ng-diagram-palette-item-preview>
      </ng-diagram-palette-item>

      <div class="note-list" aria-live="polite">
        @for (note of store.notes(); track note.id) {
          <button
            type="button"
            class="note-item"
            [class.selected]="note.selected"
            [title]="note.data.text"
            (click)="store.selectNote(note.id)"
          >
            {{ note.data.text || '(empty note)' }}
          </button>
        } @empty {
          <p class="empty">No notes yet — drag the Note item onto the map.</p>
        }
      </div>
    </section>
  </aside>
}
