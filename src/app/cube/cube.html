@let data = icosa();

<div class="wrapper">
  @if (visible()) {
    <!-- <div class="current-value">{{ currentValue() }}</div> -->
    <div class="cube-area" [style.--cube-size.px]="size()">
      <button type="button" class="close-btn" (click)="hide()">✕</button>
      <div
        class="scene"
        [style.--cube-size.px]="size()"
        [style.--edge.px]="data.edge"
        [style.--dist.px]="data.dist"
      >
        <div class="cube" [style.transform]="cubeTransform()">
          @for (face of data.faces; track face.label) {
            <div
              class="face"
              [style.--yaw.deg]="face.yaw"
              [style.--pitch.deg]="face.pitch"
              [style.--roll.deg]="face.roll"
            >
              <span class="label">{{ face.label }}</span>
            </div>
          }
        </div>
      </div>
    </div>
  }
  <button
    type="button"
    class="draw-btn"
    (click)="draw()"
    [disabled]="isAnimating()"
  >Draw</button>
</div>
