<nav class="toolbar" aria-label="Toolbar">
  <div class="toolbar__group">
    <button
      type="button"
      class="toolbar__button"
      title="Add character"
      aria-label="Add character"
      (click)="addCharacterClicked.emit()"
    >
      <ng-icon name="phosphorUser" size="16" />
    </button>
    <button
      type="button"
      class="toolbar__button"
      [class.toolbar__button--active]="activeTool() === 'pin'"
      [attr.aria-pressed]="activeTool() === 'pin'"
      title="Add pin — click on the map to place"
      aria-label="Add pin"
      (click)="toggle('pin')"
    >
      <ng-icon name="phosphorMapPinLine" size="16" />
    </button>
    <button
      type="button"
      class="toolbar__button"
      [class.toolbar__button--active]="activeTool() === 'note'"
      [attr.aria-pressed]="activeTool() === 'note'"
      title="Add note — click on the map to place"
      (click)="toggle('note')"
    >
      <ng-icon name="phosphorChatCentered" size="16" />
    </button>
    <button
      type="button"
      class="toolbar__button"
      [class.toolbar__button--active]="activeTool() === 'ruler'"
      [attr.aria-pressed]="activeTool() === 'ruler'"
      title="Ruler — drag to measure"
      (click)="toggle('ruler')"
    >
      <ng-icon name="phosphorRuler" size="16" />
    </button>
    <button
      type="button"
      class="toolbar__button"
      [class.toolbar__button--active]="activeTool() === 'circle'"
      [attr.aria-pressed]="activeTool() === 'circle'"
      title="Spell area — drag to set radius"
      (click)="toggle('circle')"
    >
      <ng-icon name="phosphorAsterisk" size="16" />
    </button>
  </div>
</nav>

@if (activeTool()) {
  <div
    class="overlay"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    (pointercancel)="onPointerUp()"
  ></div>
}
