<nav class="toolbar" aria-label="Toolbar">
  <div class="toolbar__group">
    <button
      type="button"
      class="toolbar__button"
      [class.toolbar__button--active]="characterFlyoutOpen()"
      [attr.aria-pressed]="characterFlyoutOpen()"
      title="Add character — drag onto the map"
      aria-label="Add character"
      (click)="toggleCharacterFlyout()"
    >
      <ng-icon name="phosphorUser" size="16" />
    </button>
    <button
      type="button"
      class="toolbar__button"
      [class.toolbar__button--active]="activeTool() === 'pin'"
      [attr.aria-pressed]="activeTool() === 'pin'"
      title="Add pin — click on the map to place"
      aria-label="Add pin"
      (click)="toggle('pin')"
    >
      <ng-icon name="phosphorMapPinLine" size="16" />
    </button>
  </div>

  <div class="toolbar__divider" role="separator"></div>

  <div class="toolbar__group">
    <button
      type="button"
      class="toolbar__button"
      [class.toolbar__button--active]="activeTool() === 'note'"
      [attr.aria-pressed]="activeTool() === 'note'"
      title="Add note — click on the map to place"
      (click)="toggle('note')"
    >
      <ng-icon name="phosphorChatCentered" size="16" />
    </button>
    <button
      type="button"
      class="toolbar__button"
      [class.toolbar__button--active]="activeTool() === 'ruler'"
      [attr.aria-pressed]="activeTool() === 'ruler'"
      title="Ruler — drag to measure"
      (click)="toggle('ruler')"
    >
      <ng-icon name="phosphorRuler" size="16" />
    </button>
    <button
      type="button"
      class="toolbar__button"
      [class.toolbar__button--active]="activeTool() === 'circle'"
      [attr.aria-pressed]="activeTool() === 'circle'"
      title="Spell area — drag to set radius"
      (click)="toggle('circle')"
    >
      <ng-icon name="phosphorCircleDashed" size="16" />
    </button>
  </div>

  @if (characterFlyoutOpen()) {
    <div class="character-flyout" role="dialog" aria-label="Characters">
      <div class="character-flyout__header">Characters</div>
      <div class="character-flyout__grid">
        @for (entry of characterEntries(); track entry.type.id) {
          <ng-diagram-palette-item
            class="character-flyout__item"
            [item]="entry.item"
            [title]="'Drag ' + entry.type.label + ' to the map'"
          >
            <img
              class="character-flyout__image"
              [src]="entry.type.imageUrl"
              [alt]="entry.type.label"
              draggable="false"
            />
            <span class="character-flyout__label">{{ entry.type.label }}</span>
          </ng-diagram-palette-item>
        }
      </div>
    </div>
  }
</nav>

@if (activeTool()) {
  <div
    class="overlay"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    (pointercancel)="onPointerUp()"
    (wheel)="onWheel($event)"
  ></div>
}
